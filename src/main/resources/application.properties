# Spring Boot Application Configuration
spring.application.name=myApp

# MongoDB Database Configuration
# Connects to MongoDB running on localhost at port 27017
spring.data.mongodb.uri=mongodb://localhost:27017/room_allocation_db

# Server Configuration
server.port=8080

# Jackson Configuration for JSON serialization
spring.jackson.serialization.indent-output=true

# JPA/Hibernate Configuration (for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Kafka Configuration
# Bootstrap servers for Kafka cluster
spring.kafka.bootstrap-servers=localhost:9092

# Consumer Configuration
spring.kafka.consumer.group-id=room-allocation-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.myApp.entity,com.example.myApp.dto

# Producer Configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.delivery-timeout-ms=30000
spring.kafka.producer.request-timeout-ms=20000

# Listener Configuration
spring.kafka.listener.ack-mode=manual_immediate
spring.kafka.listener.concurrency=3
spring.kafka.listener.poll-timeout=3000
