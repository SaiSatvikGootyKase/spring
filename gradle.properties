# Gradle Configuration for Room Allocation System
# This file helps Gradle find the correct Java installation

# Java Toolchain Configuration
# Set the Java home directory if needed
# Uncomment and set the path to your Java 21 installation
# org.gradle.java.home=C:/Program Files/Java/jdk-21

# Enable Gradle daemon for faster builds
org.gradle.daemon=true

# Configure parallel build execution
org.gradle.parallel=true

# Configure build cache
org.gradle.caching=true

# JVM options for Gradle
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
